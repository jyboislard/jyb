<form id="voteForm">
  <label>Code du juge</label>
  <input type="text" name="code_juge" required>

  <label>Code de la photo</label>
  <input type="text" name="code_photo" required>

  <label>Note 1</label>
  <input type="number" name="note_1" min="1" max="10" required>

  <label>Note 2</label>
  <input type="number" name="note_2" min="1" max="10" required>

  <button type="submit">Envoyer</button>
</form>

<script>
document.getElementById("voteForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  fetch("https://script.google.com/macros/s/AKfycbykKeTdHKsVgKQhETFkijbOOH4o6oy28k3Hd0YIpp2mrTn6zJJoxT6wyDCo08QRknNY/exec", {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "application/json" }
  })
  .then(r => r.json())
  .then(r => alert("Merci! Votre évaluation a été enregistrée."))
  .catch(err => alert("Erreur : " + err));
});
</script>
