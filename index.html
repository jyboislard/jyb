<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jugement – Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    label { display: block; margin-top: 15px; }
    input, select { padding: 5px; margin-top: 5px; width: 200px; }
    button { margin-top: 20px; padding: 10px 20px; }
    #msg { margin-top: 20px; font-weight: bold; }
  </style>
</head>

<body>

<h2>Jugement – Prototype</h2>
<h3>Créé par Jean-Yves Boislard 2026-03-02 à 15 h 06</h3>

<label>Numéro du juge</label>
<input type="number" id="juge" required>

<label>Choisir une photo</label>
<select id="photo">
  <option value="P01">Photo 1</option>
  <option value="P02">Photo 2</option>
  <option value="P03">Photo 3</option>
</select>

<label>Note 1</label>
<input type="number" id="note1" min="1" max="10" required>

<label>Note 2</label>
<input type="number" id="note2" min="1" max="10" required>

<button id="btnSoumettre">Soumettre</button>

<p id="msg"></p>

<script>
document.addEventListener("DOMContentLoaded", function() {

  document.getElementById("btnSoumettre").addEventListener("click", function() {

    const payload = {
      Code_Juge: document.getElementById("juge").value,
      Code_Photo: document.getElementById("photo").value,
      Note_1: document.getElementById("note1").value,
      Note_2: document.getElementById("note2").value
    };

    const scriptURL = "https://script.google.com/macros/s/AKfycbz-_AIR97SpaUaN2W8savu8SS_kRbINf15Z8RE76gYf6UnbPIoV2r4xH3C_vIbDXmFP/exec";

    const proxyURL = "https://corsproxy.io/?" + encodeURIComponent(scriptURL);

    fetch(proxyURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
      console.log("Réponse du serveur :", data);
      document.getElementById("msg").innerText = "Enregistré !";
      document.getElementById("note1").value = "";
      document.getElementById("note2").value = "";
    })
    .catch(err => {
      console.error("Erreur fetch :", err);
      document.getElementById("msg").innerText = "Erreur : " + err;
    });

  });

});
</script>

</body>
</html>
