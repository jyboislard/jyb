<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jugement – Prototype</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    label { display: block; margin-top: 15px; }
    input, select { padding: 5px; margin-top: 5px; width: 200px; }
    button { margin-top: 20px; padding: 10px 20px; }
    #msg { margin-top: 20px; font-weight: bold; }
  </style>
</head>

<body>

<h2>Jugement – Prototype</h2>
<h3>Créé par Jean-Yves Boislard 2026-03-02 à 16 h 03</h3>

<form id="form" method="POST" action="https://script.google.com/macros/s/AKfycbziySwFfMBlj2QIzUDhaE1UCqWTaHatJr2cK9rwxgmonZEfCorVsj7FXKL7EcBbp6IzWA/exec">

  <label>Numéro du juge</label>
  <input type="number" name="Code_Juge" required>

  <label>Choisir une photo</label>
  <select name="Code_Photo">
    <option value="P01">Photo 1</option>
    <option value="P02">Photo 2</option>
    <option value="P03">Photo 3</option>
  </select>

  <label>Note 1</label>
  <input type="number" name="Note_1" min="1" max="10" required>

  <label>Note 2</label>
  <input type="number" name="Note_2" min="1" max="10" required>

  <button type="submit">Soumettre</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<p id="msg"></p>

<script>
document.getElementById("form").addEventListener("submit", function() {
  document.getElementById("msg").innerText = "Enregistré !";
});
</script>

</body>
</html>
